app = 'rhyme-mcp'
primary_region = 'lax'

[build]

[processes]
  app = "uvicorn app:app --host 0.0.0.0 --port 8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024